name: Update egg prices

on:
  workflow_dispatch:
  schedule:
    # 14:00 Asia/Shanghai.
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Fetch latest prices
        run: node scripts/update-prices-from-sogou.mjs

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Guangxi egg prices"
          file_pattern: public/data/prices.json docs/data/prices.json
